<!-- ============================================================
  SNIPPET: Telemetry Strip Component
  Usage: Copy-paste into any page's <body> as first element.
  ============================================================ -->
<div class="telemetry-strip" role="complementary" aria-label="System status">
  <div class="telemetry-strip__group">
    <span class="telemetry-item telemetry-item--active">
      <span class="telemetry-dot" aria-hidden="true"></span>
      SYSTEM_STATUS: ONLINE
    </span>
    <span class="telemetry-item">
      SYS_TIME: <span id="telemetry-time">--:--:--</span>
    </span>
  </div>
  <span class="telemetry-item">ISO 9001:2015 COMPLIANT</span>
</div>
